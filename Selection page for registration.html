<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worksphere Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .card {
            width: 300px;
            padding: 20px;
            text-align: center;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            font-size: 20px;
            color: #555;
        }
        .card p {
            font-size: 14px;
            color: #777;
        }
        .card a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        .card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Welcome to Worksphere</h1>
    <p>Please select an option to get started:</p>
    <div class="container">
        <!-- Freelancer Card -->
        <div class="card">
            <h2>I am a Freelancer</h2>
            <p>Sign up to showcase your skills and find exciting projects to work on.</p>
            <a href="C:\Users\DIVYAM\OneDrive\Documents\Mini Project\Mini Project\Registration form for worksphere site.html">Register as Freelancer</a>
        </div>
        <!-- Hire a Freelancer Card -->
        <div class="card">
            <h2>Hire a Freelancer</h2>
            <p>Sign up to post projects and hire talented freelancers for your work.</p>
            <a href="C:\Users\DIVYAM\OneDrive\Documents\Mini Project\Mini Project\Registration page for hiring freelancers.html">Register to Hire</a>
        </div>
    </div>
</body>
</html>
