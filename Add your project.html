<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Project Submission</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>Submit Your Project</h1>
    </header>
    <div class="container">
        <h1>Add Your Project</h1>
        <form action="/submit-project" method="POST">
            <label for="projectTitle">Project Title:</label>
            <input type="text" id="projectTitle" name="projectTitle" placeholder="Enter your project title" required>
            
            <label for="description">Project Description:</label>
            <textarea id="description" name="description" placeholder="Describe your project in detail" rows="5" required></textarea>
            
            <label for="skills">Skills Required:</label>
            <input type="text" id="skills" name="skills" placeholder="e.g., HTML, CSS, JavaScript" required>
            
            <label for="budget">Budget (in USD):</label>
            <input type="number" id="budget" name="budget" placeholder="Enter your budget" min="0" required>
            
            <label for="duration">Project Duration (in Days):</label>
            <input type="number" id="duration" name="duration" placeholder="Enter project duration" min="1" required>
            
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">-- Select a Category --</option>
                <option value="webDevelopment">Web Development</option>
                <option value="graphicDesign">Graphic Design</option>
                <option value="writing">Writing & Translation</option>
                <option value="marketing">Digital Marketing</option>
                <option value="other">Other</option>
            </select>
            
            <button type="submit">Submit Project</button>
        </form>
    </div>
</body>
</html>
