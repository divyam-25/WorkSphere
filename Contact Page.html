<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Contact Us - WorkSphere</title>
    <link rel="stylesheet" href="styles.css"> 
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-color: #2a3d66;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .contact-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #2a3d66;
        }
        .contact-info, .contact-form {
            display: flex;
            justify-content: space-between;
            gap: 30px;
        }
        .contact-info div, .contact-form div {
            flex: 1;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #2a3d66;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #3e5c8a;
        }
        .footer {
            background-color: #2a3d66;
            color: white;
            text-align: center;
            padding: 10px;
            position: absolute;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Contact WorkSphere</h1>
</header>

<div class="contact-container">
    <h2>Get in Touch</h2>

    <div class="contact-info">
        <div>
            <h3>WorkSphere Team</h3>
            <p><strong>Email:</strong> <a href="mailto:team@worksphere.com">team@worksphere.com</a></p>
            <p><strong>Phone:</strong> +91 8076232741</p>
            <p><strong>Location:</strong> Ghaziabad, Uttar Pradesh, India</p>
        </div>

        <div>
            <h3>Send a Message</h3>
            <form action="https://formspree.io/f/yourformid" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <br>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
</div>
<br><br><br>
<div>
    <center><p>&copy; 2024 WorkSphere - All Rights Reserved</p></center>
</div>

</body>
</html>
