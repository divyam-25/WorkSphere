<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Registration Form</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
        }

        label {
            font-size: 1rem;
            margin: 10px 0;
            display: block;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 6px 0 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        input[type="submit"],
        input[type="reset"] {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #45a049;
        }

        .form-group {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .form-group .column {
            width: 48%;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 10px;
        }

        .terms-label {
            font-size: 0.9rem;
            color: #555;
        }

        .terms-checkbox {
            margin-top: 10px;
        }

        .portfolio {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .portfolio input {
            width: 48%;
        }

        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <form action="registration_db" method="post" onsubmit="return validateForm()">
    <div class="container">
        <h1>WorkSphere Registration Form</h1>
        <form onsubmit="return validateForm()" method="post">
            <div class="form-group">
                <div class="column">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter a password" required>

                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob" required>

                    <label>Gender:</label>
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="female"> Female
                    <input type="radio" name="gender" value="other"> Other
                </div>

                <div class="column">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Enter your mobile number" required>

                    <label for="location">Location:</label>
                    <input type="text" id="location" name="location" placeholder="Enter your location (City, Country)" required>

                    <label for="skills">Skills:</label>
                    <textarea id="skills" name="skills" rows="4" placeholder="Describe your skills" required></textarea>

                    <label for="portfolio">Portfolio/Website:</label>
                    <input type="url" id="portfolio" name="portfolio" placeholder="Enter your portfolio URL" required>

                    <div class="terms-checkbox">
                        <label class="terms-label">
                            <input type="checkbox" name="terms" required> I agree to the <a href="Terms And Conditions.html">Terms & Conditions</a>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <div class="column">
                    <label for="experience">Experience Level:</label>
                    <select id="experience" name="experience" required>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>

                <div class="column">
                    <label for="languages">Languages:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" name="languages" value="english"> English
                        <input type="checkbox" name="languages" value="spanish"> Spanish
                        <input type="checkbox" name="languages" value="french"> French
                        <input type="checkbox" name="languages" value="german"> German
                    </div>
                </div>
            </div>

            <div class="footer">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </div>
        </form>
    </div>
    </form>

    <script>
        function validateForm() {
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            var phone = document.getElementById('phone').value;
            var portfolio = document.getElementById('portfolio').value;

            if (name.length < 6 || !/^[a-zA-Z]+$/.test(name)) {
                alert("Name must contain only alphabets and should be at least 6 characters long.");
                return false;
            }
    
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }

            const emailPattern = /^[a-zA-Z0-9._-]+@[a-zA-Z]+\.[a-zA-Z]{2,}$/;
            if (!emailPattern.test(email)) {
                alert("Please enter a valid email address (e.g., name@domain.com).");
                return false;
            }
            
            // Check for empty fields
            if (!name || !email || !password || !phone || !portfolio) {
                alert("All fields are required!");
                return false;
            }

            // Check if phone number is valid (10 digits)
            var phonePattern = /^[0-9]{10}$/;
            if (!phone.match(phonePattern)) {
                alert("Please enter a valid 10-digit phone number.");
                return false;
            }

            // Check if the terms & conditions are checked
            if (!document.querySelector('input[name="terms"]').checked) {
                alert("Please agree to the Terms and Conditions.");
                return false;
            }

            return true;
        }
    </script>

</body>

</html>
